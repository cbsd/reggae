server:
  rundir: "/var/run/knot"
  user: knot:knot
  automatic-acl: on
  listen: [ 127.0.0.1@53, ::1@53, MASTER_IP@53, MASTER_IP6@53 ]

key:
  - id: ddns
    algorithm: hmac-sha256
    secret: "KEY"

acl:
  - id: ddns_acl
    key: ddns
    action: update

log:
  - target: syslog
    any: info

database:
    storage: "/var/db/knot"

remote:
#  - id: secondary
#    address: 192.168.1.1@53
#
#  - id: primary
#    address: 192.168.2.1@53

template:
  - id: default
    storage: "/var/db/knot"
    file: "%s.zone"

zone:
  - domain: DOMAIN
    acl: ddns_acl
  - domain: REVERSE_ZONE
    acl: ddns_acl
  - domain: REVERSE_IPV6_ZONE
    acl: ddns_acl
