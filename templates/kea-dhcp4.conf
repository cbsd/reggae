{
"Dhcp4": {
    "interfaces-config": {
        "interfaces": [ "eth0" ]
    },
    "control-socket": {
        "socket-type": "unix",
        "socket-name": "kea4-ctrl-socket"
    },
    "lease-database": {
        "type": "memfile",
        "lfc-interval": 3600
    },
    "renew-timer": 900,
    "rebind-timer": 1800,
    "valid-lifetime": 3600,
    "ddns-send-updates": true,
    "ddns-update-on-renew": true,
    "ddns-override-no-update": true,
    "ddns-override-client-update": true,
    "ddns-qualifying-suffix": "DOMAIN",
    "dhcp-ddns": {
        "enable-updates": true
    },
    "hooks-libraries": [
        {
            "library": "/usr/local/lib/kea/hooks/libdhcp_run_script.so",
            "parameters": {
                "name": "/usr/local/share/kea/scripts/kea.sh",
                "sync": false
            }
        }
    ],
    "subnet4": [
        {
            "id": 1,
            "subnet": "DHCP_BASE.0/24",
            "pools": [ { "pool": "DHCP_SUBNET_FIRST-DHCP_SUBNET_LAST" } ],
            "option-data": [
                {
                    "name": "routers",
                    "data": "INTERFACE_IP"
                },
                {
                    "name": "domain-name-servers",
                    "data": "INTERFACE_IP"
                }
            ]
        }
    ]
}
}
