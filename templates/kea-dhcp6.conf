{
"Dhcp6": {
    "interfaces-config": {
        "interfaces": [ "eth0" ]
    },
    "control-socket": {
        "socket-type": "unix",
        "socket-name": "kea6-ctrl-socket"
    },
    "lease-database": {
        "type": "memfile",
        "lfc-interval": 3600
    },
    "expired-leases-processing": {
        "reclaim-timer-wait-time": 10,
        "flush-reclaimed-timer-wait-time": 25,
        "hold-reclaimed-time": 3600,
        "max-reclaim-leases": 100,
        "max-reclaim-time": 250,
        "unwarned-reclaim-cycles": 5
    },
    "renew-timer": 1000,
    "rebind-timer": 2000,
    "preferred-lifetime": 3000,
    "valid-lifetime": 4000,
    "ddns-send-updates": true,
    "ddns-update-on-renew": true,
    "ddns-override-no-update": true,
    "ddns-override-client-update": true,
    "ddns-qualifying-suffix": "DOMAIN",
    "dhcp-ddns": {
        "enable-updates": true,
    },
    "subnet6": [
        {
            "id": 1,
            "interface": "eth0",
            "subnet": "IPV6_PREFIX:/64",
            "pools": [ { "pool": "IPV6_PREFIX:100 - IPV6_PREFIX:ffff" } ],
            "option-data": [
                {
                    "name": "dns-servers",
                    "data": "IPV6_PREFIXINTERFACE_IP6"
                }
            ]
        }
    ],
    "loggers": [
    {
        "name": "kea-dhcp6",
        "output-options": [
            {
                "output": "kea-dhcp6.log"
            }
        ],
        "severity": "INFO",
        "debuglevel": 0
    }
  ]
}
}
