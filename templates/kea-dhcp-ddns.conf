{
"DhcpDdns":
{
  "control-socket": {
      "socket-type": "unix",
      "socket-name": "kea-ddns-ctrl-socket"
  },
  "tsig-keys": [
    {
      "name": "ddns",
      "algorithm": "hmac-sha256",
      "secret": "KEY"
    }
  ],
  "forward-ddns" : {
    "ddns-domains": [
      {
        "name": "DOMAIN.",
        "key-name": "ddns",
        "dns-servers": [ { "ip-address": "127.0.0.1" } ]
      }
    ]
  },
  "reverse-ddns" : {
    "ddns-domains": [
      {
        "name": "REVERSE_IPV6.",
        "key-name": "ddns",
        "dns-servers": [ { "ip-address": "::1" } ]
      },
      {
        "name": "REVERSE.",
        "key-name": "ddns",
        "dns-servers": [ { "ip-address": "127.0.0.1" } ]
      }
    ]
  },
  "loggers": [
    {
      "name": "kea-dhcp-ddns",
      "output-options": [
        {
          "output": "kea-ddns.log"
        }
      ],
      "severity": "INFO",
      "debuglevel": 0
    }
  ]
}
}
